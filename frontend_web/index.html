            var container = document.getElementById('fileListContent');
            container.innerHTML = '<div class="loading-state"><span class="loading"></span>加载中...</div>';
            Logger.info('加载文件列表', currentPath || '(根目录)');
            API.files.list(currentPath, currentToken).then(function (res) {
                if (!res.ok) {
                    if (res.status === 401) handleSessionExpired();
                    else {
                        showAlert(res.error || '加载文件列表失败', 'error');
                        Logger.error('加载文件列表失败', res.status, res.error);
                    }
                    container.innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><div>加载失败，请重试</div></div>';
                    return;
                }
                var data = res.data;
                var directories = (data && data.directories) ? data.directories : [];
                var files = (data && data.files) ? data.files : [];
                var total = (data && data.total !== undefined) ? data.total : files.length;

                var snap = fileListSnapshotKey(currentPath, directories, files);
                if (snap) fileListLastSnapshot = snap;
                renderList(directories, files, false);
                document.getElementById('fileCount').textContent = total + ' 个文件';
                updateBreadcrumb();
                if (container) container.scrollTop = 0;

                var hasUnparsedFiles = files.some(filePendingAiParse);
                if (hasUnparsedFiles) {
                    Logger.info('检测到未解析图片，启动列表轮询');
                    startFileListPolling();
                }
                touchListFetchTime();
            }).catch(function (err) {
                Logger.error('加载文件列表异常', err);
                container.innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><div>网络错误，请重试</div></div>';
            }).finally(function () {
                fileListNetworkInFlight = false;
                fileListLoadLocked = false;
                if (fileListLoadPending) {
                    fileListLoadPending = false;
                    loadFileList();
                }
            });
        }

        /** 删除/重命名等操作后刷新列表：不清空搜索、不插「加载中」占位，并尽量保持滚动位置 */
        function refreshFileListSoft() {
            if (fileListLoadLocked) {
                Logger.debug('软刷新跳过：全量 loadFileList 进行中');
                return;
            }
            if (fileListNetworkInFlight) {
                Logger.debug('软刷新跳过：已有 files/list 在途');
                return;
            }
            var scrollY = window.scrollY != null ? window.scrollY : window.pageYOffset;
            var scrollX = window.scrollX != null ? window.scrollX : window.pageXOffset;
            var listEl = document.getElementById('fileListContent');
            var listScrollTop = listEl ? listEl.scrollTop : 0;
            function restoreScroll() {
                restoreScrollAfterListRender(scrollX, scrollY, listScrollTop);
            }
            if (isSearchView) {
                var q = document.getElementById('searchInput').value.trim();
                if (!q) {
                    loadFileList();
                    return;
                }
                Logger.info('软刷新搜索结果', q);
                API.ai.search(q, 20, currentToken, currentSearchMode).then(function (res) {
                    if (!res.ok) {
                        if (res.status === 401) handleSessionExpired();
                        else showAppToast(res.error || '刷新列表失败', 'error');
                        return;
                    }
                    var data = res.data;
                    var results = Array.isArray(data && data.results) ? data.results : [];
                    var total = (data && typeof data.total === 'number') ? data.total : results.length;
                    var mode = (data && data.mode) ? data.mode : '';
                    renderList([], results, true);
                    document.getElementById('fileCount').textContent = '找到 ' + total + ' 个结果' + (mode ? ' (' + mode + ')' : '');
                    restoreScroll();
                }).catch(function (err) {
                    Logger.error('软刷新搜索异常', err);
                    showAppToast('刷新失败，请重试', 'error');
                });
                return;
            }
            Logger.info('软刷新文件列表', currentPath || '(根目录)');
            fileListNetworkInFlight = true;
            API.files.list(currentPath, currentToken).then(function (res) {
                if (!res.ok) {
                    if (res.status === 401) handleSessionExpired();
                    else showAppToast(res.error || '刷新列表失败', 'error');
                    return;
                }
                var data = res.data;
                var directories = (data && data.directories) ? data.directories : [];
                var files = (data && data.files) ? data.files : [];
                var total = (data && data.total !== undefined) ? data.total : files.length;
                var snap = fileListSnapshotKey(currentPath, directories, files);
                if (snap) fileListLastSnapshot = snap;
                renderList(directories, files, false);
                document.getElementById('fileCount').textContent = total + ' 个文件';
                updateBreadcrumb();
                var hasUnparsedFiles = files.some(filePendingAiParse);
                if (hasUnparsedFiles) startFileListPolling();
                else stopFileListPolling();
                restoreScroll();
                touchListFetchTime();
            }).catch(function (err) {
                Logger.error('软刷新列表异常', err);
                showAppToast('刷新失败，请重试', 'error');
            }).finally(function () {
                fileListNetworkInFlight = false;
            });
        }

        function updateSelectionBar() {
            var bar = document.getElementById('mobileSelectionBar');
            var btn = document.getElementById('btnToggleSelectMode');
            var cnt = document.getElementById('selectionCountEl');
            var fl = document.getElementById('fileListSection');
            var n = Object.keys(selectedFileMap).length;
            if (cnt) cnt.textContent = '已选 ' + n;
            if (btn) btn.textContent = fileSelectionMode ? '取消' : '多选';
            if (bar) bar.classList.toggle('hidden', !fileSelectionMode);
            if (fl) fl.classList.toggle('selection-mode', fileSelectionMode);
        }

        function toggleFileSelectionMode() {
            if (!isNarrowMobile()) return;
            fileSelectionMode = !fileSelectionMode;
            if (!fileSelectionMode) selectedFileMap = {};
            updateSelectionBar();
            refreshFileListSoft();
        }

        function clearFileSelection() {
            selectedFileMap = {};
            document.querySelectorAll('#fileListContent .file-select-cb').forEach(function (cb) { cb.checked = false; });
            document.querySelectorAll('#fileListContent .file-item-selected').forEach(function (r) { r.classList.remove('file-item-selected'); });
            updateSelectionBar();
        }

        function selectAllVisibleFiles() {
            selectedFileMap = {};
            document.querySelectorAll('#fileListContent .file-item:not(.file-item-dir)').forEach(function (row) {
                var enc = row.getAttribute('data-fid') || '';
                if (!enc) return;
                var id = decodeURIComponent(enc);
                var ne = row.getAttribute('data-fname') || '';
                selectedFileMap[id] = ne ? decodeURIComponent(ne) : id;
                var cb = row.querySelector('.file-select-cb');
                if (cb) cb.checked = true;
                row.classList.add('file-item-selected');
            });
            updateSelectionBar();
        }

        function batchDownloadSelected() {
            var ids = Object.keys(selectedFileMap);
            if (!ids.length) {
                showAppToast('请先选择文件', 'error');
                return;
            }
            var delay = 0;
            ids.forEach(function (id) {
                var name = selectedFileMap[id];
                setTimeout(function () { downloadFile(id, name); }, delay);
                delay += 450;
            });
            showAppToast('已开始依次下载 ' + ids.length + ' 个文件', 'success');
        }

        function showBatchDeleteConfirm() {
            var ids = Object.keys(selectedFileMap);
            if (!ids.length) {
                showAppToast('请先选择文件', 'error');
                return;
            }
            pendingDeleteFileId = null;
            pendingDeleteBatchIds = ids.slice();
            document.getElementById('deleteModalMessage').textContent = '确定删除已选中的 ' + ids.length + ' 个文件吗？此操作不可撤销。';
            document.getElementById('deleteModal').classList.remove('hidden');
        }

        // 进入子目录（与后端 path 参数一致）
        function enterDirectory(path) {
            fileSelectionMode = false;
            selectedFileMap = {};
            updateSelectionBar();
            currentPath = path || '';
            loadFileList();
        }

        /**
         * 根据当前路径与列表中的子目录填充「上传目标」下拉框。
         * 进入新目录时默认对齐 currentPath；在同一目录下因刷新/轮询重绘时保留用户已选的上传文件夹，避免始终被打回根目录。
         */
        function fillUploadDestSelect(subdirs) {
            var sel = document.getElementById('uploadDestSelect');
            if (!sel) return;
            var hadOptions = sel.options && sel.options.length > 0;
            var previousValue = hadOptions ? sel.value : undefined;
            var browsingUnchanged = lastUploadDestFillBrowsingPath === currentPath;

            sel.innerHTML = '';
            function addOpt(value, label) {
                var o = document.createElement('option');
                o.value = value;
                o.textContent = label;
                sel.appendChild(o);
            }
            addOpt('', '根目录');
            var parts = (currentPath || '').split('/').filter(Boolean);
            for (var i = 0; i < parts.length; i++) {
                var p = parts.slice(0, i + 1).join('/');
                addOpt(p, p.split('/').join(' › '));
            }
            var seen = {};
            seen[''] = true;
            (subdirs || []).forEach(function (d) {
                var p = (d && d.path) ? String(d.path) : '';
                if (!p || seen[p]) return;
                seen[p] = true;
                var nm = (d && d.name) ? String(d.name) : p;
                addOpt(p, '📁 ' + nm + '（子文件夹）');
            });

            lastUploadDestFillBrowsingPath = currentPath;

            if (browsingUnchanged && hadOptions) {
                var j;
                for (j = 0; j < sel.options.length; j++) {
                    if (sel.options[j].value === previousValue) {
                        sel.selectedIndex = j;
                        updateUploadDestHint();
                        return;
                    }
                }
            }
            syncUploadDestSelectValue();
            updateUploadDestHint();
        }

        function syncUploadDestSelectValue() {
            var sel = document.getElementById('uploadDestSelect');
            if (!sel) return;
            var target = currentPath || '';
            var i;
            for (i = 0; i < sel.options.length; i++) {
                if (sel.options[i].value === target) {
                    sel.selectedIndex = i;
                    updateUploadDestHint();
                    return;
                }
            }
            if (target) {
                var o = document.createElement('option');
                o.value = target;
                o.textContent = target.split('/').join(' › ');
                sel.appendChild(o);
                sel.value = target;
            } else {
                sel.value = '';
            }
            updateUploadDestHint();
        }

        /**
         * 可选子路径框的校验（与后端段规则一致：trim 段、禁止单独的 . / ..）。
         * @returns {{ ok: boolean, error?: string }}
         */
        function validateUploadExtraPath() {
            var el = document.getElementById('uploadDestExtraPath');
            var raw = el ? String(el.value || '').trim() : '';
            if (!raw) return { ok: true };
            if (sanitizePathSegments(raw) === null) {
                return { ok: false, error: '子路径不合法：不能包含单独的 . 或 .. 作为路径段' };
            }
            return { ok: true };
        }

        /** 合并下拉目录与可选子路径，得到相对网盘根的父路径（不含文件名）；不存在目录时由后端创建 */
        function getEffectiveUploadRelativePath() {
            var sel = document.getElementById('uploadDestSelect');
            var extraEl = document.getElementById('uploadDestExtraPath');
            var base = sel ? String(sel.value || '').trim() : '';
            base = base.replace(/\\/g, '/').replace(/^\/+|\/+$/g, '');
            var extraRaw = extraEl ? String(extraEl.value || '').trim() : '';
            if (!extraRaw) {
                return base;
            }
            var extraNorm = sanitizePathSegments(extraRaw);
            if (extraNorm === null) {
                return base;
            }
            if (!extraNorm) {
                return base;
            }
            return base ? (base + '/' + extraNorm) : extraNorm;
        }

        function updateUploadDestHint() {
            var hint = document.getElementById('uploadDestHint');
            if (!hint) return;
            hint.style.color = '';
            var el = document.getElementById('uploadDestExtraPath');
            var raw = el ? String(el.value || '').trim() : '';
            if (raw && sanitizePathSegments(raw) === null) {
                hint.textContent = '子路径不合法，请修正（不能使用单独的 . 或 .. 作为一段）';
                hint.style.color = 'var(--danger-color)';
                return;
            }
            var p = getEffectiveUploadRelativePath();
            hint.textContent = p ? ('将上传到：' + p.split('/').join(' / ')) : '将上传到：根目录';
        }

        /**
         * 规范化用户输入的路径段：逐段 trim，跳过空段；任一段为 . 或 .. 则整段路径无效。
         * 与后端 _normalize_rel_segments 行为对齐。
         */
        function sanitizePathSegments(path) {
            var raw = String(path || '').replace(/\\/g, '/').split('/');
            var out = [];
            for (var i = 0; i < raw.length; i++) {
                var seg = raw[i].trim();
                if (!seg) continue;
                if (seg === '..' || seg === '.') return null;
                out.push(seg);
            }
            return out.join('/');
        }

        /**
         * 文件夹上传：将「上传目标」与 File.webkitRelativePath 中的目录部分拼接。
         * webkitRelativePath 形如「所选根文件夹名/子目录/文件名」，整段相对路径会落在所选目标之下。
         * @returns {string|null} 目标目录相对路径；null 表示非法路径，调用方应跳过该文件。
         */
        function mergeFolderUploadPath(webkitRelativePath) {
            var baseRaw = getEffectiveUploadRelativePath();
            var base = sanitizePathSegments(baseRaw);
            if (baseRaw && base === null) {
                return null;
            }
            var wrp = String(webkitRelativePath || '').replace(/\\/g, '/');
            if (!wrp) return base || '';
            var lastSlash = wrp.lastIndexOf('/');
            var dirOnly = lastSlash < 0 ? '' : wrp.slice(0, lastSlash);
            var sub = sanitizePathSegments(dirOnly);
            if (dirOnly && sub === null) {
                return null;
            }
            if (!sub) return base || '';
            return base ? (base + '/' + sub) : sub;
        }

        function updateBreadcrumb() {
            var el = document.getElementById('breadcrumb');
            if (!el) return;
            if (isSearchView || !currentPath) {
                el.classList.add('hidden');
                el.innerHTML = '';
                return;
            }
            el.classList.remove('hidden');
            var parts = currentPath.split('/').filter(Boolean);
            var html = '<a href="javascript:enterDirectory(\'\')">根目录</a>';
            for (var i = 0; i < parts.length; i++) {
                var path = parts.slice(0, i + 1).join('/');
                html += ' / <a href="javascript:enterDirectory(\'' + path.replace(/'/g, "\\'") + '\')">' + escapeHtml(parts[i]) + '</a>';
            }
            el.innerHTML = html;
        }

        // 渲染列表：directories + files，与后端 FileListResponse / SearchResponse 一致
        function renderList(directories, files, isSearch) {
            var container = document.getElementById('fileListContent');
            var fileCountEl = document.getElementById('fileCount');
            var dirs = directories || [];
            var list = files || [];
            var total = list.length;

            if (dirs.length === 0 && list.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div>' + (isSearch ? '未找到匹配文件' : '暂无文件，请上传文件') + '</div></div>';
                fileCountEl.textContent = '0 个文件';
                if (!isSearch) {
                    fillUploadDestSelect([]);
                }
                updateSelectionBar();
                return;
            }

            var selOn = fileSelectionMode && isNarrowMobile();
            var html = '';
            if (!isSearch && dirs.length > 0) {
                html += dirs.map(function (d) {
                    var safePath = (d.path || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
                    var safeName = escapeHtml(d.name || '');
                    return '<div class="file-item file-item-dir" onclick="enterDirectory(\'' + safePath + '\')">' +
                        '<div class="file-icon">📁</div><div class="file-info"><div class="file-name">' + safeName + '</div><div class="file-meta">目录</div></div><div class="file-actions"></div></div>';
                }).join('');
            }
            html += list.map(function (file) {
                var icon = getFileIcon(file.filetype);
                var size = formatFileSize(file.size || 0);
                var date = file.upload_time ? new Date(file.upload_time).toLocaleDateString('zh-CN') : '—';
                var isParsed = file.is_ai_parsed;
                var fid = (file.file_id || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
                var fname = (file.filename || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;');
                var ftype = (file.filetype || '').toLowerCase();
                var isImage = ftype.indexOf('image/') === 0 || /\.(jpg|jpeg|png|gif|webp|bmp)$/i.test(file.filename || '');
                var isVideo = ftype.indexOf('video/') === 0;
                var isAudio = ftype.indexOf('audio/') === 0;
                var canPreview = isImage || isVideo || isAudio;
                var reparseBtn = isImage
                    ? '<button type="button" class="btn btn-secondary btn-sm" onclick="event.stopPropagation();reparseFile(\'' + fid + '\')" title="重新解析" aria-label="重新解析">🔄<span class="file-action-label"> 重新解析</span></button>'
                    : '';
                var previewBtn = canPreview
                    ? '<button type="button" class="btn btn-secondary btn-sm" onclick="event.stopPropagation();openPreview(\'' + fid + '\', \'' + (ftype || '').replace(/'/g, "\\'") + '\', \'' + fname + '\')" title="预览" aria-label="预览">👁️<span class="file-action-label"> 预览</span></button>'
                    : '';
                var encFid = encodeURIComponent(file.file_id || '');
                var encMime = encodeURIComponent(ftype || '');
                var encName = encodeURIComponent(file.filename || '');
                var nameTitle = escapeHtmlAttr(file.filename || '');
                var rawId = file.file_id || '';
                var isSel = selOn && rawId && selectedFileMap[rawId];
                var selCol = selOn
                    ? '<label class="file-select-wrap" onclick="event.stopPropagation();">' +
                      '<input type="checkbox" class="file-select-cb" data-fid="' + encFid + '"' + (isSel ? ' checked' : '') + ' aria-label="选择文件"></label>'
                    : '';
                return '<div class="file-item' + (isSel ? ' file-item-selected' : '') + '" data-fid="' + encFid + '" data-mime="' + encMime + '" data-fname="' + encName + '" data-can-preview="' + (canPreview ? '1' : '0') + '">' +
                    selCol +
                    '<div class="file-icon" aria-hidden="true">' + icon + '</div>' +
                    '<div class="file-info"><div class="file-name" title="' + nameTitle + '">' + escapeHtml(file.filename) + '</div>' +
                    '<div class="file-meta"><span>' + size + '</span><span>' + date + '</span>' +
                    (isParsed ? '<span class="badge badge-success">AI 已解析</span>' : '<span class="badge badge-warning">未解析</span>') + '</div></div>' +
                    '<div class="file-actions">' +
                    reparseBtn +
                    previewBtn +
                    '<button type="button" class="btn btn-secondary btn-sm" onclick="event.stopPropagation();showRenameModal(\'' + fid + '\', \'' + fname + '\')" title="重命名" aria-label="重命名">✏️<span class="file-action-label"> 重命名</span></button>' +
                    '<button type="button" class="btn btn-primary btn-sm" onclick="event.stopPropagation();downloadFile(\'' + fid + '\', \'' + (file.filename || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;') + '\')" title="下载" aria-label="下载">⬇️<span class="file-action-label"> 下载</span></button>' +
                    '<button type="button" class="delete-btn" onclick="event.stopPropagation();showDeleteConfirm(\'' + fid + '\', \'' + fname + '\')" title="删除" aria-label="删除">🗑️<span class="file-action-label"> 删除</span></button>' +
                    '</div></div>';
            }).join('');
            container.innerHTML = html;
            fileCountEl.textContent = total + ' 个文件';
            if (!isSearch) {
                fillUploadDestSelect(dirs);
            }
            updateSelectionBar();
        }

        /** 未解析但可能由后台异步变为已解析的类型（与可触发 AI 解析的图片一致）；.py 等不应触发列表轮询 */
        function filePendingAiParse(file) {
            if (!file || file.is_ai_parsed) return false;
            var t = (file.filetype || '').toLowerCase();
            var n = file.filename || '';
            if (t.indexOf('image/') === 0) return true;
            return /\.(jpg|jpeg|png|gif|webp|bmp)$/i.test(n);
        }

        function escapeHtmlAttr(s) {
            if (!s) return '';
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/"/g, '&quot;')
                .replace(/</g, '&lt;');
        }

        function escapeHtml(s) {
            if (!s) return '';
            var div = document.createElement('div');
            div.textContent = s;
            return div.innerHTML;
        }

        // 获取文件图标
        function getFileIcon(filetype) {
            if (!filetype || typeof filetype !== 'string') return '📄';
            var t = filetype.toLowerCase();
            if (t.indexOf('image/') === 0) return '🖼️';
            if (t.indexOf('video/') === 0) return '🎬';
            if (t.indexOf('audio/') === 0) return '🎵';
            if (t.indexOf('pdf') !== -1) return '📕';
            if (t.indexOf('word') !== -1 || t.indexOf('document') !== -1) return '📘';
            if (t.indexOf('excel') !== -1 || t.indexOf('spreadsheet') !== -1) return '📊';
            if (t.indexOf('powerpoint') !== -1 || t.indexOf('presentation') !== -1) return '📊';
            if (t.indexOf('zip') !== -1 || t.indexOf('compressed') !== -1) return '📦';
            return '📄';
        }

        // 格式化文件大小
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }

        // 预览：图片/音视频使用 /files/{id}/preview 拉取 blob 后展示
        var previewObjectUrl = null;
        function openPreview(fileId, filetype, filename) {
            var overlay = document.getElementById('previewOverlay');
            var img = document.getElementById('previewImage');
            var video = document.getElementById('previewVideo');
            var audio = document.getElementById('previewAudio');
            var unsupported = document.getElementById('previewUnsupported');
            img.classList.add('hidden');
            video.classList.add('hidden');
            audio.classList.add('hidden');
            unsupported.classList.add('hidden');
            if (previewObjectUrl) {
                window.URL.revokeObjectURL(previewObjectUrl);
                previewObjectUrl = null;
            }
            overlay.classList.remove('hidden');
            Logger.info('打开预览', fileId, filename);
            API.files.preview(fileId, currentToken).then(function (res) {
                if (!res.ok) {
                    showAlert(res.error || '预览失败', 'error');
                    Logger.error('预览失败', res.error);
                    unsupported.classList.remove('hidden');
                    unsupported.textContent = res.error || '预览失败';
                    return;
                }
                previewObjectUrl = window.URL.createObjectURL(res.blob);
                var type = (filetype || '').toLowerCase();
                if (type.indexOf('image/') === 0) {
                    img.src = previewObjectUrl;
                    img.classList.remove('hidden');
                } else if (type.indexOf('video/') === 0) {
                    video.src = previewObjectUrl;
                    video.classList.remove('hidden');
                } else if (type.indexOf('audio/') === 0) {
                    audio.src = previewObjectUrl;
                    audio.classList.remove('hidden');
                } else {
                    unsupported.classList.remove('hidden');
                }
            }).catch(function (err) {
                Logger.error('预览请求异常', err);
                unsupported.classList.remove('hidden');
                unsupported.textContent = err && err.message ? err.message : '预览失败';
            });
        }
        function closePreview(event) {
            if (event && event.target !== event.currentTarget) return;
            document.getElementById('previewOverlay').classList.add('hidden');
            var video = document.getElementById('previewVideo');
            var audio = document.getElementById('previewAudio');
            if (video) { video.pause(); video.src = ''; }
            if (audio) { audio.pause(); audio.src = ''; }
            if (previewObjectUrl) {
                window.URL.revokeObjectURL(previewObjectUrl);
                previewObjectUrl = null;
            }
        }

        // 判断是否为 UUID 或 UUID.扩展名，用于下载时优先使用列表中的显示名
        function looksLikeUuidFilename(name) {
            if (!name || typeof name !== 'string') return true;
            return /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}(\.[^.]+)?$/i.test(name.trim());
        }
        // 下载文件（与后端 GET /files/{file_id}/download 一致）；displayFilename 为列表中显示名，用于响应名为 UUID 时的回退
        function downloadFile(fileId, displayFilename) {
            API.files.download(fileId, currentToken).then(function (res) {
                if (!res.ok) {
                    if (res.status === 401) handleSessionExpired();
                    else {
                        showAlert('下载失败：' + (res.error || '未知错误'), 'error');
                        Logger.error('下载失败', res.status, res.error);
                    }
                    return;
                }
                var name = res.filename;
                if ((!name || looksLikeUuidFilename(name)) && displayFilename) name = displayFilename;
                if (!name) name = fileId;
                if (displayFilename && !looksLikeUuidFilename(displayFilename)) name = displayFilename;
                var url = window.URL.createObjectURL(res.blob);
                var a = document.createElement('a');
                a.href = url;
                a.download = name;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
                Logger.info('文件已下载', name);
            });
        }

        // 重新解析（与后端 POST /ai/parse/{file_id} 一致，force=true 强制重新解析）
        function reparseFile(fileId) {
            if (!currentToken) {
                showAlert('请先登录', 'error');
                return;
            }
            showAlert('正在提交 AI 解析…', 'success');
            API.ai.parse(fileId, true, currentToken).then(function (res) {
                if (res.ok && res.data && res.data.success) {
                    showAlert('已提交重新解析，请稍候刷新列表查看状态', 'success');
                    startFileListPolling();
                    refreshFileListSoft();
                } else {
                    showAlert(res.error || '重新解析失败', 'error');
                }
            }).catch(function () {
                showAlert('重新解析请求失败', 'error');
            });
        }

        // 上传：显式按钮选择文件 / 文件夹（保留目录结构）
        (function () {
            var fi = document.getElementById('fileInput');
            var fo = document.getElementById('folderInput');
            var bf = document.getElementById('btnPickFiles');
            var bd = document.getElementById('btnPickFolder');
            if (bf && fi) {
                bf.addEventListener('click', function (e) {
                    e.stopPropagation();
                    fi.click();
                });
            }
            if (bd && fo) {
                bd.addEventListener('click', function (e) {
                    e.stopPropagation();
                    fo.click();
                });
            }
        })();

        // 文件选择处理（支持多选，加入队列）
        function handleFileSelect(event) {
            var files = event.target.files;
            if (!files || files.length === 0) return;
            for (var i = 0; i < files.length; i++) {
                uploadFile(files[i], {});
            }
        }

        // 文件夹选择：每个 File 带 webkitRelativePath，上传到目标下并保持子目录
        function handleFolderSelect(event) {
            var files = event.target.files;
            if (!files || !files.length) return;
            var n = files.length;
            showAppToast('已开始上传文件夹（共 ' + n + ' 个文件），将保留目录结构…', 'success');
            for (var i = 0; i < n; i++) {
                var f = files[i];
                var wrp = f.webkitRelativePath || f.name;
                uploadFile(f, { webkitRelativePath: wrp, quietBatch: true });
            }
            event.target.value = '';
        }

        // 拖拽上传
        const uploadArea = document.getElementById('uploadArea');

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('drag-over');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('drag-over');
        });

        uploadArea.addEventListener('drop', function (e) {
            e.preventDefault();
            uploadArea.classList.remove('drag-over');
            var files = e.dataTransfer.files;
            if (files && files.length > 0) {
                for (var i = 0; i < files.length; i++) {
                    uploadFile(files[i], {});
                }
            }
        });

        // 大文件使用断点续传的阈值（10MB），与后端分片 5MB 配合
        var RESUMABLE_UPLOAD_THRESHOLD = 10 * 1024 * 1024;
        var UPLOAD_CONCURRENT_MAX = 2;
        var uploadQueue = [];
        var uploadActiveCount = 0;

        function processUploadQueue() {
            while (uploadQueue.length > 0 && uploadActiveCount < UPLOAD_CONCURRENT_MAX) {
                uploadActiveCount += 1;
                var item = uploadQueue.shift();
                doUploadOne(item.file, item.onComplete, item);
            }
        }
        function doUploadOne(file, onComplete, item) {
            item = item || {};
            var pathErr = validateUploadExtraPath();
            if (!pathErr.ok) {
                uploadActiveCount -= 1;
                var progressContainer = document.getElementById('uploadProgress');
                if (uploadActiveCount <= 0 && progressContainer) {
                    progressContainer.style.display = 'none';
                }
                showAlert(pathErr.error || '上传路径无效', 'error');
                if (typeof onComplete === 'function') onComplete();
                processUploadQueue();
                return;
            }
            var progressContainer = document.getElementById('uploadProgress');
            var progressFill = document.getElementById('progressFill');
            var progressText = document.getElementById('progressText');
            if (uploadActiveCount === 1) {
                progressContainer.style.display = 'block';
                progressFill.style.width = '0%';
                progressText.textContent = '0%';
            }
            function onProgress(loaded, total) {
                if (total && total > 0) {
                    var pct = Math.round((loaded / total) * 100);
                    progressFill.style.width = pct + '%';
                    progressText.textContent = pct + '%';
                }
            }
            var uploadRelPath;
            if (item.webkitRelativePath) {
                uploadRelPath = mergeFolderUploadPath(item.webkitRelativePath);
                if (uploadRelPath === null) {
                    uploadActiveCount -= 1;
                    if (uploadActiveCount <= 0) progressContainer.style.display = 'none';
                    var skipMsg = '路径中含有非法段（. 或 ..），已跳过：' + (item.webkitRelativePath || file.name);
                    if (item.quietBatch) showAppToast(skipMsg, 'error');
                    else showAlert(skipMsg, 'error');
                    if (typeof onComplete === 'function') onComplete();
                    processUploadQueue();
                    return;
                }
            } else {
                uploadRelPath = getEffectiveUploadRelativePath();
            }
            var uploadPromise = (file.size > RESUMABLE_UPLOAD_THRESHOLD)
                ? API.files.uploadResumable(file, currentToken, onProgress, uploadRelPath)
                : API.files.upload(file, currentToken, onProgress, uploadRelPath);
            uploadPromise.then(function (res) {
                uploadActiveCount -= 1;
                if (uploadActiveCount <= 0) progressContainer.style.display = 'none';
                if (res.ok && (res.status === 201 || (res.data && res.data.file_id))) {
                    if (!item.quietBatch) {
                        showAlert('文件上传成功：' + file.name, 'success');
                    }
                    Logger.info('文件上传成功', file.name, file.size, item.webkitRelativePath || '');
                    refreshFileListSoft();
                    if (file.type && file.type.indexOf('image/') === 0) {
                        Logger.info('图片已上传，启动 AI 解析轮询');
                        startFileListPolling();
                    }
                } else {
                    var errLabel = (item.webkitRelativePath || file.name);
                    showAlert((res.error || '文件上传失败') + ' — ' + errLabel, 'error');
                    Logger.error('上传失败', file.name, res.error);
                }
                if (typeof onComplete === 'function') onComplete();
                processUploadQueue();
            }).catch(function (err) {
                uploadActiveCount -= 1;
                if (uploadActiveCount <= 0) progressContainer.style.display = 'none';
                showAlert((err && err.message ? err.message : '文件上传失败') + ' — ' + (item.webkitRelativePath || file.name), 'error');
                Logger.error('上传异常', file.name, err);
                if (typeof onComplete === 'function') onComplete();
                processUploadQueue();
            });
        }

        // 上传文件：小文件走普通上传，大文件走断点续传；支持多文件队列，最多 2 个并发
        // opts.webkitRelativePath: 文件夹上传时浏览器提供的相对路径（含根文件夹名与子目录）
        // opts.quietBatch: 批量时不逐个弹成功提示
        function uploadFile(file, opts) {
            if (!file) return;
            opts = opts || {};
            var queueItem = {
                file: file,
                onComplete: function () {},
                webkitRelativePath: opts.webkitRelativePath || '',
                quietBatch: !!opts.quietBatch,
            };
            if (uploadActiveCount < UPLOAD_CONCURRENT_MAX && uploadQueue.length === 0) {
                uploadActiveCount += 1;
                doUploadOne(file, function () {}, queueItem);
            } else {
                uploadQueue.push(queueItem);
                if (!opts.quietBatch) {
                    showAlert('已加入上传队列，当前队列 ' + (uploadQueue.length + uploadActiveCount) + ' 个', 'success');
                }
            }
            document.getElementById('fileInput').value = '';
            return;
        }
        // 搜索：仅当用户点击「搜索」或按 Enter 时执行，输入过程中不自动搜索
        document.getElementById('searchInput').addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                runSearch((this.value || '').trim());
            }
        });

        // 切换搜索模式（按文件名 / 图片语义）
        function setSearchMode(mode) {
            currentSearchMode = mode === 'vector' ? 'vector' : 'filename';
            document.querySelectorAll('.search-tab').forEach(function (el) {
                el.classList.toggle('active', el.getAttribute('data-mode') === currentSearchMode);
            });
        }

        // 取消搜索，恢复文件列表
        function cancelSearch() {
            document.getElementById('searchInput').value = '';
            document.getElementById('cancelSearchBtn').classList.add('hidden');
            isSearchView = false;
            fileSelectionMode = false;
            selectedFileMap = {};
            updateSelectionBar();
            loadFileList();
        }

        function runSearch(q) {
            if (!(q && q.trim())) {
                cancelSearch();
                return;
            }
            searchFiles(q.trim());
        }
        // 搜索（与后端 POST /ai/search 一致；结果防呆解析，避免 0 条显示异常）
        function searchFiles(query) {
            var q = (query || '').trim();
            if (!q) {
                cancelSearch();
                return;
            }
            isSearchView = true;
            fileSelectionMode = false;
            selectedFileMap = {};
            updateSelectionBar();
            stopFileListPolling();
            updateBreadcrumb();
            document.getElementById('cancelSearchBtn').classList.remove('hidden');
            var container = document.getElementById('fileListContent');
            container.innerHTML = '<div class="loading-state"><span class="loading"></span>搜索中...</div>';
            Logger.info('搜索', q, '模式:', currentSearchMode);
            API.ai.search(q, 20, currentToken, currentSearchMode).then(function (res) {
                if (!res.ok) {
                    if (res.status === 401) handleSessionExpired();
                    else {
                        showAlert(res.error || '搜索失败', 'error');
                        Logger.error('搜索失败', res.status, res.error);
                    }
                    loadFileList();
                    return;
                }
                var data = res.data;
                var results = Array.isArray(data && data.results) ? data.results : [];
                var total = (data && typeof data.total === 'number') ? data.total : results.length;
                var mode = (data && data.mode) ? data.mode : '';
                renderList([], results, true);
                document.getElementById('fileCount').textContent = '找到 ' + total + ' 个结果' + (mode ? ' (' + mode + ')' : '');
            }).catch(function (err) {
                Logger.error('搜索异常', err);
                container.innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><div>搜索失败，请重试</div></div>';
            });
        }

        let pendingDeleteFileId = null;
        let deleteRequestInFlight = false;
        let pendingRenameFileId = null;

        function showRenameModal(fileId, currentFilename) {
            pendingRenameFileId = fileId;
            var input = document.getElementById('renameInput');
            if (input) {
                input.value = currentFilename || '';
                input.focus();
            }
            document.getElementById('renameModal').classList.remove('hidden');
        }
        function confirmRename() {
            if (!pendingRenameFileId) return;
            var input = document.getElementById('renameInput');
            var newName = (input && input.value || '').trim();
            if (!newName) {
                showAlert('请输入新文件名', 'error');
                return;
            }
            if (newName.indexOf('/') !== -1 || newName === '.' || newName === '..') {
                showAlert('文件名不能包含路径', 'error');
                return;
            }
            API.files.rename(pendingRenameFileId, newName, currentToken).then(function (res) {
                if (!res.ok) {
                    showAlert(res.error || '重命名失败', 'error');
                    return;
                }
                showAlert('重命名成功', 'success');
                cancelRename();
                refreshFileListSoft();
            }).catch(function (err) {
                showAlert(err && err.message ? err.message : '重命名失败', 'error');
            });
        }
        function cancelRename() {
            pendingRenameFileId = null;
            document.getElementById('renameModal').classList.add('hidden');
            var input = document.getElementById('renameInput');
            if (input) input.value = '';
        }

        function showDeleteConfirm(fileId, filename) {
            pendingDeleteBatchIds = null;
            pendingDeleteFileId = fileId;
            document.getElementById('deleteModalMessage').textContent = `确定要删除文件 "${filename}" 吗？此操作不可撤销。`;
            document.getElementById('deleteModal').classList.remove('hidden');
        }

        function confirmDelete() {
            if (deleteRequestInFlight) return;
            if (pendingDeleteBatchIds && pendingDeleteBatchIds.length) {
                var batch = pendingDeleteBatchIds.slice();
                pendingDeleteBatchIds = null;
                deleteRequestInFlight = true;
                var deleteBtns = document.querySelectorAll('#deleteModal .modal-buttons .btn');
                deleteBtns.forEach(function (b) { b.disabled = true; });
                function step() {
                    if (!batch.length) {
                        deleteRequestInFlight = false;
                        deleteBtns.forEach(function (b) { b.disabled = false; });
                        cancelDelete();
                        fileSelectionMode = false;
                        selectedFileMap = {};
                        updateSelectionBar();
                        refreshFileListSoft();
                        showAppToast('已删除所选文件', 'success');
                        return;
                    }
                    var fid = batch.shift();
                    API.files.delete(fid, currentToken).then(function (res) {
                        if (!res.ok) {
                            deleteRequestInFlight = false;
                            deleteBtns.forEach(function (b) { b.disabled = false; });
                            if (res.status === 401) handleSessionExpired();
                            else showAlert(res.error || '删除失败', 'error');
                            cancelDelete();
                            refreshFileListSoft();
                            return;
                        }
                        step();
                    }).catch(function (err) {
                        deleteRequestInFlight = false;
                        deleteBtns.forEach(function (b) { b.disabled = false; });
                        showAlert(err && err.message ? err.message : '删除失败', 'error');
                        cancelDelete();
                        refreshFileListSoft();
                    });
                }
                step();
                return;
            }
            if (!pendingDeleteFileId) return;
            deleteRequestInFlight = true;
            var deleteBtns = document.querySelectorAll('#deleteModal .modal-buttons .btn');
            deleteBtns.forEach(function (b) { b.disabled = true; });
            var fid = pendingDeleteFileId;
            API.files.delete(fid, currentToken).then(function (res) {
                deleteRequestInFlight = false;
                deleteBtns.forEach(function (b) { b.disabled = false; });
                if (!res.ok) {
                    if (res.status === 401) handleSessionExpired();
                    else showAlert(res.error || '删除失败', 'error');
                    return;
                }
                cancelDelete();
                showAlert('文件已删除', 'success');
                refreshFileListSoft();
            }).catch(function (err) {
                deleteRequestInFlight = false;
                deleteBtns.forEach(function (b) { b.disabled = false; });
                showAlert(err && err.message ? err.message : '删除失败', 'error');
            });
        }

        function cancelDelete() {
            pendingDeleteFileId = null;
            pendingDeleteBatchIds = null;
            deleteRequestInFlight = false;
            document.getElementById('deleteModal').classList.add('hidden');
            document.querySelectorAll('#deleteModal .modal-buttons .btn').forEach(function (b) { b.disabled = false; });
        }
    </script>
</body>
</html>
